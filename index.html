<!DOCTYPE html>
<html>
  <head>
    <title>Portal Venezuela MR - GitHub Edition</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    
    <style>
      #overlay {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); z-index: 10000;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        color: white; font-family: sans-serif; text-align: center;
      }
      .btn-ven {
        padding: 15px 30px; font-size: 18px; background: #FFCC00; 
        border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: #0033A0;
      }
    </style>

    <script>
      // COMPONENTE DE AGARRE (Hand Tracking)
      AFRAME.registerComponent('agarrar-mano', {
        init: function () {
          this.grabbedEl = null;
          this.el.addEventListener('pinchstarted', () => {
            let handPos = new THREE.Vector3();
            this.el.object3D.getWorldPosition(handPos);
            let items = document.querySelectorAll('.agarrable');
            let seleccionado = null;
            let dMin = 0.35;

            items.forEach(item => {
              let itemPos = new THREE.Vector3();
              item.object3D.getWorldPosition(itemPos);
              if (handPos.distanceTo(itemPos) < dMin) { 
                dMin = handPos.distanceTo(itemPos); 
                seleccionado = item; 
              }
            });

            if (seleccionado) {
              this.grabbedEl = seleccionado;
              this.el.object3D.attach(this.grabbedEl.object3D);
              this.grabbedEl.setAttribute('emissive', '#444');
            }
          });
          this.el.addEventListener('pinchended', () => {
            if (this.grabbedEl) {
              this.el.sceneEl.object3D.attach(this.grabbedEl.object3D);
              this.grabbedEl.setAttribute('emissive', '#000');
              this.grabbedEl = null;
            }
          });
        }
      });

      // LÓGICA DE STENCIL (Portal)
      AFRAME.registerComponent('stencil-mask', {
        init: function () {
          this.el.addEventListener('loaded', () => {
            let mesh = this.el.getObject3D('mesh');
            mesh.material.colorWrite = false;
            mesh.material.stencilWrite = true;
            mesh.material.stencilRef = 1;
            mesh.material.stencilFunc = THREE.AlwaysStencilFunc;
            mesh.material.stencilZPass = THREE.ReplaceStencilOp;
          });
        }
      });

      AFRAME.registerComponent('stencil-content', {
        init: function () {
          this.el.addEventListener('loaded', () => {
            let mesh = this.el.getObject3D('mesh');
            mesh.material.stencilWrite = true;
            mesh.material.stencilRef = 1;
            mesh.material.stencilFunc = THREE.EqualStencilFunc;
          });
        }
      });
    </script>
  </head>

  <body>
    <div id="overlay">
      <h1 style="color: #FFCC00;">VENEZUELA 360</h1>
      <p>Selecciona el video de tus lentes para activar el portal:</p>
      <input type="file" id="file-input" accept="video/mp4" style="margin-bottom: 20px;">
      <button id="start-btn" class="btn-ven" style="display: none;">INICIAR AR</button>
    </div>

    <a-scene webxr="optionalFeatures: local-floor;" background="transparent" renderer="alpha: true; stencil: true;" xr-mode-ui="XRMode: ar">
      
      <a-assets>
        <video id="video360" loop="true" crossorigin="anonymous" playsinline muted></video>
        <a-asset-item id="puerta-3d" src="PEGA_AQUI_EL_ENLACE_RAW_DE_TU_MODELO.glb"></a-asset-item>
      </a-assets>

      <a-entity hand-tracking-controls="hand: left" agarrar-mano></a-entity>
      <a-entity hand-tracking-controls="hand: right" agarrar-mano></a-entity>

      <a-entity position="0 1.2 -0.8">
        <a-box class="agarrable" position="-0.3 0 0" scale="0.12 0.12 0.12" color="#FFCC00"></a-box> 
        <a-sphere class="agarrable" position="0 0 0" radius="0.08" color="#0033A0"></a-sphere>
        <a-box class="agarrable" position="0.3 0 0" scale="0.12 0.12 0.12" color="#CF142B"></a-box>
      </a-entity>

      <a-entity position="0 0 -2">
        <a-gltf-model src="#puerta-3d" scale="1 1 1"></a-gltf-model>
        <a-plane stencil-mask position="0 1.2 0" width="1.6" height="2.2"></a-plane>
        <a-videosphere id="esfera-video" stencil-content src="#video360" radius="50"></a-videosphere>
      </a-entity>

    </a-scene>

    <script>
      const fileInput = document.getElementById('file-input');
      const startBtn = document.getElementById('start-btn');
      const video = document.getElementById('video360');

      fileInput.onchange = (e) => {
        video.src = URL.createObjectURL(e.target.files[0]);
        startBtn.style.display = 'block';
      };

      startBtn.onclick = () => {
        video.play();
        document.getElementById('overlay').style.display = 'none';
      };
    </script>
  </body>
</html>
